name = "gitsnip-worker"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# Routes
# Uncomment after domain is set up:
# routes = [
#   { pattern = "api.gitsnip.cc/*", zone_name = "gitsnip.cc" }
# ]

# KV namespace for caching GitHub tree responses
[[kv_namespaces]]
binding = "GITSNIP_CACHE"
id = "375e5ab3bb2f4eb7a396b1fdca020652"
preview_id = "8141835788f047909750d2bb33529b8e"

# Rate limiting
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# KV namespace for subscription state (Phase 1)
[[kv_namespaces]]
binding = "GITSNIP_SUBS"
id = "8d91d2432a264c1e8426be9ddfb7a054"
preview_id = "fdd12a2d960e440ca3a28e33509d78d2"

[vars]
ENVIRONMENT = "production"
MAX_FILES = "500"
MAX_SIZE_MB = "100"

# Tier file limits (Phase 1)
FREE_FILE_LIMIT = "50"
TOKEN_FILE_LIMIT = "200"
PRO_FILE_LIMIT = "1000"

# Secrets (set via: wrangler secret put <NAME>)
# GITHUB_TOKEN = "..."
# STRIPE_SECRET_KEY = "..."
# STRIPE_WEBHOOK_SECRET = "..."
# STRIPE_PRO_PRICE_ID = "..."
# STRIPE_POWER_PRICE_ID = "..."
