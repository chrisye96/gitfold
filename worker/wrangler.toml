name = "gitfold-worker"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# Routes
# Uncomment after domain is set up:
routes = [
  { pattern = "api.gitfold.cc/*", zone_name = "gitfold.cc" }
]

# KV namespace for caching GitHub tree responses + SSE job zips
[[kv_namespaces]]
binding = "GITFOLD_CACHE"
id = "375e5ab3bb2f4eb7a396b1fdca020652"
preview_id = "8141835788f047909750d2bb33529b8e"

# Rate limiting
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[vars]
ENVIRONMENT = "production"
MAX_FILES = "500"
MAX_SIZE_MB = "100"

# File limits — bring-your-own GitHub token raises the cap (no paid tiers)
FREE_FILE_LIMIT = "50"
TOKEN_FILE_LIMIT = "200"

# ─── R2 Bucket for ZIP caching ─────────────────────────
[[r2_buckets]]
binding = "R2_CACHE"
bucket_name = "gitfold-cache"

# ─── Cron Trigger: clean up old R2 ZIP caches daily ────
[triggers]
crons = ["0 3 * * *"]

# Secrets (set via: wrangler secret put <NAME>)
# GITHUB_TOKEN = "..."   # optional shared fallback token for anonymous requests
