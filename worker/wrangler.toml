name = "gitsnip-worker"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# Routes
# Uncomment after domain is set up:
# routes = [
#   { pattern = "api.gitsnip.cc/*", zone_name = "gitsnip.cc" }
# ]

# KV namespace for caching GitHub tree responses
[[kv_namespaces]]
binding = "GITSNIP_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# Rate limiting
[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[vars]
ENVIRONMENT = "production"
MAX_FILES = "500"
MAX_SIZE_MB = "100"

# Secrets (set via: wrangler secret put GITHUB_TOKEN)
# GITHUB_TOKEN = "..."
