<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitFold</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="popup-header">
      <img src="../../icons/icon-16.png" width="16" height="16" alt="" class="popup-logo" />
      <span class="popup-title">GitFold</span>
    </div>

    <!-- Status line: shown when token is saved -->
    <div id="status-row" class="status-row" hidden>
      <span id="status-text" class="status-text"></span>
      <button id="clear-btn" class="btn-clear" type="button">Clear</button>
    </div>

    <!-- Token input: shown when no token or on edit -->
    <div id="input-row" class="input-row">
      <input
        type="password"
        id="token-input"
        class="token-input"
        placeholder="ghp_xxxxxxxxxxxx"
        autocomplete="off"
        readonly
        aria-label="GitHub personal access token"
        aria-describedby="token-error token-hint"
      />
      <button id="save-btn" class="btn-save" type="button" disabled>Save</button>
    </div>

    <!-- Validation error -->
    <p id="token-error" class="token-error" hidden aria-live="polite"></p>

    <!-- Hint -->
    <div id="token-hint" class="token-hint">
      <p class="hint-rate">
        Adds 5,000 req/hr limit.
        <a href="https://github.com/settings/tokens/new?scopes=public_repo&description=GitFold"
           target="_blank" rel="noopener noreferrer" id="generate-link">Generate token ↗</a>
      </p>
      <p class="hint-secure">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M4 4a4 4 0 0 1 8 0v2h.5A1.5 1.5 0 0 1 14 7.5v6A1.5 1.5 0 0 1 12.5 15h-9A1.5 1.5 0 0 1 2 13.5v-6A1.5 1.5 0 0 1 3.5 6H4V4Zm2 2h4V4a2 2 0 1 0-4 0v2Zm2 4.5a1 1 0 1 0-2 0v1a1 1 0 1 0 2 0v-1Z"/>
        </svg>
        Stored locally — never sent to our servers
      </p>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
