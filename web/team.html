<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team — GitFold</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="refresh" content="0; url=/" />

  <!-- ── Theme / PWA ──────────────────────────────────────────────────────── -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0f1a"  media="(prefers-color-scheme: dark)" />
  <script>(function(){var t=localStorage.getItem('gitfold-theme');if(t==='dark'||t==='light')document.documentElement.dataset.theme=t})()</script>
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />

  <!-- ── Styles ────────────────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>

<body>

  <!-- Header: rendered by layout.js -->
  <header class="site-header" role="banner"></header>

  <main class="site-main site-main--narrow" id="main-content">

    <!-- Visually-hidden live region for screen reader announcements -->
    <div id="status-region" aria-live="polite" aria-atomic="true"
         class="sr-only" role="status"></div>

    <div id="team-main" class="team-loading">Loading…</div>

  </main>

  <!-- Footer: rendered by layout.js -->
  <footer class="site-footer" role="contentinfo"></footer>

  <script type="module" src="/js/team.js"></script>

</body>
</html>
