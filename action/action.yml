name: 'GitFold'
description: 'Download any GitHub directory as a zip or tar.gz archive'
author: 'GitFold'
branding:
  icon: 'download'
  color: 'yellow'

inputs:
  url:
    description: 'GitHub directory or repository URL to download'
    required: true
  output:
    description: 'Output file path (default: auto-named based on directory)'
    required: false
    default: ''
  format:
    description: 'Archive format: zip or tar.gz'
    required: false
    default: 'zip'
  token:
    description: 'GitHub Personal Access Token (increases rate limit to 5,000 req/hour)'
    required: false
    default: ''

outputs:
  path:
    description: 'Absolute path to the downloaded archive file'
    value: ${{ steps.download.outputs.path }}

runs:
  using: 'composite'
  steps:
    - name: Download with GitFold
      id: download
      shell: bash
      env:
        GITFOLD_URL: ${{ inputs.url }}
        GITFOLD_OUTPUT: ${{ inputs.output }}
        GITFOLD_FORMAT: ${{ inputs.format }}
        GITFOLD_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail

        ARGS=("$GITFOLD_URL")
        [ -n "$GITFOLD_OUTPUT" ]                && ARGS+=(--output "$GITFOLD_OUTPUT")
        [ "$GITFOLD_FORMAT" = "tar.gz" ]        && ARGS+=(--format tar.gz)
        [ -n "$GITFOLD_TOKEN" ]                 && ARGS+=(--token "$GITFOLD_TOKEN")

        npx --yes gitfold "${ARGS[@]}"

        # Resolve output path for the action output
        if [ -n "$GITFOLD_OUTPUT" ]; then
          echo "path=$(realpath "$GITFOLD_OUTPUT")" >> "$GITHUB_OUTPUT"
        fi
